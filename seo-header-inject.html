<!-- FAQPage — accordion Q&A from services/overview split-image accordion (squarespace-split-image-accordion.html) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What are postural assessments?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "So often, we are told our posture is \"bad\" or \"wrong.\" I view it differently: your body has simply found clever ways to keep you moving. A postural assessment is our chance to pinpoint where your body exists in space, and to discover if there are opportunities for optimization. Together, we'll create a personalized plan to help you move more freely, and do the things you love to do!"
      }
    },
    {
      "@type": "Question",
      "name": "What is science-backed coaching?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "My training approach is rooted in exercise science, and physiology at its core. Combining my Bachelor's Degree in Exercise Science, experience working as a personal trainer with diverse populations for 8 years, and devotion to continuing education, I translate complex health concepts into a simple effective roadmap for you."
      }
    },
    {
      "@type": "Question",
      "name": "What is personalized programming?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A program only works if it fits your life. Drawing on my exercise science degree and years in corporate wellness, I build custom programs that respect your schedule and your injury history if applicable. Whether it's a micro-break routine to fit your desk job, or a 4-day strength training split, every exercise is chosen to help you move through the world with ease."
      }
    },
    {
      "@type": "Question",
      "name": "What does a goal oriented approach mean?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Every big win is built on a foundation of small, intentional victories. It all starts by honoring where you are today and identifying the milestones that will move the needle day by day. This is a collaborative journey where your feedback is just as important as the data. Together, we'll turn \"I wish I could\" into \"I'm glad I did,\" celebrating every step of your evolution."
      }
    }
  ]
}
</script>
