<style>
  .cta-block {
    --brand-blue: #1C77A6;
    --brand-red: #BB2327;
    --blue-soft: rgba(28, 119, 166, 0.08);
    --red-soft: rgba(187, 35, 39, 0.06);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 58vh;
    padding: 80px 24px 100px;
    overflow: hidden;
  }

  /* Ambient background */
  .cta-block::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, var(--blue-soft), transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, var(--red-soft), transparent 50%);
    pointer-events: none;
  }

  .cta-block__inner {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 640px;
  }

  .cta-block__label {
    font-family: serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--brand-blue);
    margin-bottom: 20px;
    opacity: 0.9;
  }

  .cta-block h2 {
    font-family: serif;
    font-size: clamp(2.25rem, 5.5vw, 3.75rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.12;
    color: #0f172a;
    margin: 0 0 24px;
  }

  .cta-block h2 .accent {
    color: var(--brand-blue);
    font-weight: 800;
  }

  .cta-block__lead {
    font-size: 1.125rem;
    line-height: 1.65;
    color: #475569;
    max-width: 520px;
    margin: 0 auto 40px;
    font-weight: 400;
  }

  .cta-block__btn-wrap {
    display: inline-flex;
    align-items: center;
    gap: 0;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 18px 32px;
    background-color: var(--brand-red);
    color: #fff;
    font-family: serif;
    font-size: 0.9375rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.35s ease, transform 0.3s ease, box-shadow 0.35s ease;
    box-shadow:
      0 1px 2px rgba(0, 0, 0, 0.04),
      0 4px 12px rgba(187, 35, 39, 0.25);
  }

  .cta-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--brand-blue);
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .cta-btn span,
  .cta-btn .cta-btn__arrow {
    position: relative;
    z-index: 1;
  }

  .cta-btn .cta-btn__arrow {
    display: inline-block;
    transition: transform 0.3s ease;
  }

  .cta-btn:hover {
    color: #fff;
    transform: translateY(-2px);
    box-shadow:
      0 4px 16px rgba(187, 35, 39, 0.3),
      0 0 0 1px rgba(28, 119, 166, 0.15);
  }

  .cta-btn:hover::before {
    opacity: 1;
  }

  .cta-btn:hover .cta-btn__arrow {
    transform: translateX(4px);
  }

  .cta-btn:active {
    transform: translateY(0);
  }

  /* Optional divider */
  .cta-block__divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--brand-blue), transparent);
    opacity: 0.4;
    margin: 0 auto 28px;
    border-radius: 1px;
  }

  @media (max-width: 768px) {
    .cta-block {
      min-height: auto;
      padding: 72px 20px 80px;
    }

    .cta-block__label {
      font-size: 0.6875rem;
      letter-spacing: 0.18em;
      margin-bottom: 16px;
    }

    .cta-block h2 {
      font-size: 1.875rem;
      margin-bottom: 20px;
    }

    .cta-block__lead {
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .cta-btn {
      padding: 16px 28px;
      font-size: 0.875rem;
    }

    .cta-btn:active {
      background-color: var(--brand-blue);
      transform: scale(0.98);
    }
  }
</style>

<div class="cta-block">
  <div class="cta-block__inner">
    <p class="cta-block__label">Your next step</p>
    <div class="cta-block__divider" aria-hidden="true"></div>
    <h2><span class="accent">Move Better. Live Fuller.</span><br>Build Your Foundation.</h2>
    <p class="cta-block__lead">Stop settling for temporary relief. Start a science-backed approach to strength that respects your history and supports your future.</p>
    <div class="cta-block__btn-wrap">
      <a href="/contact" class="cta-btn">
        <span>Book A Free Consultation</span>
        <span class="cta-btn__arrow" aria-hidden="true">→</span>
      </a>
    </div>
  </div>
</div>
