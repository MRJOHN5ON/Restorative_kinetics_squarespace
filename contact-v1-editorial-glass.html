<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Contact — Version 1</title>
  <!-- CONTACT v1 — Editorial glass -->
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

  html {
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  @media (max-width: 900px) {
    html {
      -webkit-text-size-adjust: auto;
      text-size-adjust: auto;
      font-size: 110%;
    }
  }

  @media (max-width: 420px) {
    html {
      font-size: 118%;
    }
  }

  body {
    margin: 0;
    min-height: 100dvh;
    overflow-x: clip;
  }

  .rk-contact-v1 {
    --blue: #3498db;
    --blue-dark: #2980b9;
    --red: #e74c3c;
    --text: #1a1f26;
    --text-muted: #4d5560;
    --surface: #ffffff;
    --header-highlight: #e4f2fb;
    --radius-xl: clamp(20px, 3.2vw, 32px);
    --glass-fill: linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.58) 0%,
      rgba(228, 242, 251, 0.45) 42%,
      rgba(255, 255, 255, 0.4) 100%
    );
    --glass-border: rgba(255, 255, 255, 0.75);
    --glass-shadow:
      0 4px 28px rgba(52, 152, 219, 0.09),
      0 1px 4px rgba(26, 31, 38, 0.05),
      inset 0 1px 0 rgba(255, 255, 255, 0.7);
    --blur: blur(28px) saturate(1.14);
    --ease: cubic-bezier(0.33, 1, 0.68, 1);
    box-sizing: border-box;
    font-family: 'Poppins', 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
    max-width: 1100px;
    margin: 0 auto;
    padding: clamp(16px, 4vw, 40px);
    background: #dba523;
    isolation: isolate;
    overflow-x: clip;
  }

  .rk-contact-v1 * { box-sizing: border-box; }

  .rk-contact-v1 img {
    max-width: 100%;
    height: auto;
  }

  .rk-contact-v1__grid {
    display: grid;
    gap: clamp(20px, 3vw, 28px);
    grid-template-columns: 1fr;
    min-width: 0;
  }

  @media (min-width: 900px) {
    .rk-contact-v1__grid {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.15fr);
      align-items: start;
    }
  }

  .rk-contact-v1__visual {
    position: relative;
    min-width: 0;
    max-width: 100%;
    padding: clamp(24px, 4vw, 40px);
    border-radius: var(--radius-xl);
    background: var(--glass-fill);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    text-align: center;
  }

  .rk-contact-v1__photo-wrap {
    position: relative;
    width: min(280px, 100%);
    max-width: 100%;
    aspect-ratio: 1;
    margin: 0 auto clamp(20px, 3vw, 28px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .rk-contact-v1__photo-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--red), #fff);
    z-index: 0;
    animation: rk-cv1-spin 14s linear infinite;
  }

  @keyframes rk-cv1-spin {
    to { filter: hue-rotate(360deg); }
  }

  .rk-contact-v1__photo {
    position: relative;
    z-index: 1;
    width: calc(100% - 14px);
    height: calc(100% - 14px);
    border-radius: 50%;
    object-fit: cover;
    object-position: center 22%;
    display: block;
    border: 3px solid var(--surface);
    box-sizing: border-box;
  }

  .rk-contact-v1__logo {
    width: min(200px, 100%);
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
    filter: drop-shadow(0 6px 20px rgba(26, 31, 38, 0.12));
  }

  .rk-contact-v1__panel {
    min-width: 0;
    max-width: 100%;
    border-radius: var(--radius-xl);
    padding: clamp(28px, 4vw, 44px);
    background: var(--glass-fill);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
  }

  .rk-contact-v1__provider {
    font-size: clamp(1.05rem, 2vw, 1.25rem);
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text);
    margin: 0 0 0.35rem;
  }

  .rk-contact-v1__eyebrow {
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--red);
    margin: 0 0 0.5rem;
  }

  .rk-contact-v1__divider {
    width: 72px;
    height: 2px;
    margin: 0 0 1.25rem;
    background: linear-gradient(90deg, var(--red), var(--blue), transparent);
    border-radius: 1px;
    opacity: 0.85;
  }

  .rk-contact-v1 h1 {
    font-size: clamp(1.85rem, 3.5vw, 2.5rem);
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin: 0 0 1rem;
    overflow-wrap: anywhere;
  }

  .rk-contact-v1 h1 strong {
    font-weight: 700;
    color: var(--blue-dark);
  }

  .rk-contact-v1__lead {
    margin: 0 0 1.75rem;
    color: var(--text-muted);
    line-height: 1.75;
    max-width: 48ch;
    font-size: 1rem;
    overflow-wrap: anywhere;
  }

  .rk-contact-v1__links {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .rk-contact-v1__links a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    max-width: 100%;
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    padding: 0.65rem 0.85rem;
    overflow-wrap: anywhere;
    word-break: break-word;
    border-radius: 14px;
    background: linear-gradient(var(--header-highlight), var(--header-highlight));
    background-size: 100% 100%;
    border: 1px solid rgba(52, 152, 219, 0.2);
    transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
  }

  .rk-contact-v1__links a:hover,
  .rk-contact-v1__links a:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(52, 152, 219, 0.18);
    outline: none;
  }

  .rk-contact-v1__links a[href^="mailto:"] {
    font-size: 0.9rem;
    line-height: 1.35;
  }

  .rk-contact-v1__address {
    margin: 0 0 1.25rem;
    color: var(--text-muted);
    line-height: 1.65;
    font-style: normal;
    max-width: 40ch;
    overflow-wrap: anywhere;
  }

  .rk-contact-v1__map {
    position: relative;
    max-width: 100%;
    border-radius: clamp(16px, 2vw, 22px);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.65);
    box-shadow: 0 4px 24px rgba(26, 31, 38, 0.08);
    margin-bottom: 1.5rem;
    aspect-ratio: 16 / 10;
    min-height: 220px;
  }

  .rk-contact-v1__map iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  @media (max-width: 900px) {
    .rk-contact-v1 {
      width: 100%;
      max-width: 100%;
      padding: 16px clamp(12px, 4vw, 20px) 24px;
      box-sizing: border-box;
    }

    .rk-contact-v1__visual,
    .rk-contact-v1__panel {
      padding: clamp(16px, 4vw, 24px);
      box-sizing: border-box;
    }

    .rk-contact-v1__photo-wrap {
      width: min(340px, 100%);
      max-width: 100%;
    }

    .rk-contact-v1__logo {
      width: min(260px, 100%);
      max-width: 100%;
    }

    .rk-contact-v1__provider {
      font-size: 1.15rem;
    }

    .rk-contact-v1__eyebrow {
      font-size: 0.8125rem;
      letter-spacing: 0.16em;
    }

    .rk-contact-v1 h1 {
      font-size: clamp(2.125rem, 8.5vw, 2.85rem);
      line-height: 1.12;
    }

    .rk-contact-v1__lead {
      font-size: clamp(1.125rem, 4.5vw, 1.3rem);
      line-height: 1.65;
      max-width: none;
    }

    .rk-contact-v1__address {
      font-size: 1.05rem;
      max-width: none;
    }

    .rk-contact-v1__links a {
      min-height: 52px;
      padding: 1rem 1.15rem;
      font-size: 1.125rem;
      width: 100%;
      justify-content: center;
    }

    .rk-contact-v1__links a[href^="mailto:"] {
      font-size: clamp(0.8rem, 3.25vw, 0.9rem);
      line-height: 1.4;
      padding-top: 0.85rem;
      padding-bottom: 0.85rem;
    }

    .rk-contact-v1__map {
      min-height: 280px;
      aspect-ratio: 4 / 3;
    }
  }

  /* Single column only: details + map first, portrait block last */
  @media (max-width: 899px) {
    .rk-contact-v1__panel {
      order: 1;
    }

    .rk-contact-v1__visual {
      order: 2;
    }
  }
</style>
</head>
<body>

<section class="rk-contact-v1" aria-label="Contact">
  <div class="rk-contact-v1__grid">
    <div class="rk-contact-v1__visual">
      <div class="rk-contact-v1__photo-wrap">
        <img
          class="rk-contact-v1__photo"
          src="https://i.postimg.cc/CM9dhPMb/Allie-Training-97.jpg"
          alt="Allie Church"
          width="560"
          height="560"
          loading="lazy"
        >
      </div>
      <img
        class="rk-contact-v1__logo"
        src="https://i.postimg.cc/QNBPSC3P/upscaled-2x-traced-unnamed.png"
        alt="Restorative Kinetics"
        width="400"

    <div class="rk-contact-v1__panel">
      <p class="rk-contact-v1__provider">Allie Church</p>
      <p class="rk-contact-v1__eyebrow">Get in touch</p>
      <div class="rk-contact-v1__divider" aria-hidden="true"></div>
      <h1>Let’s move <strong>better</strong>—together.</h1>
      <p class="rk-contact-v1__lead">
        I’m Allie Church—reach out for questions, scheduling, or to book your complimentary consultation.
      </p>

      <div class="rk-contact-v1__links">
        <a href="tel:+15412207347">541-220-7347</a>
        <a href="mailto:Restorativekinetics.fitness@gmail.com">Restorativekinetics.fitness@gmail.com</a>
      </div>

      <address class="rk-contact-v1__address">
        14 Moreland CT.<br>
        Manhattan, MT 59741
      </address>

      <div class="rk-contact-v1__map">
        <iframe
          title="Map: 14 Moreland Ct., Manhattan, MT"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=14+Moreland+Ct,+Manhattan,+MT+59741&amp;output=embed"
          allowfullscreen
        ></iframe>
      </div>
    </div>
  </div>
</section>

</body>
</html>
